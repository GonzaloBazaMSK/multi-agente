<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redis — MSK Latam</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1020; --surface: #261e2e; --surface2: #322838; --surface3: #3d2f48;
  --border: rgba(255,100,150,0.12); --primary: #ff2d78; --primary-dark: #e0206a; --green: #22c55e; --red: #ef4444;
  --yellow: #f59e0b; --text: #f0e8f4; --text2: #9a8ea8; --text3: #6b5a7a;
  --radius: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 54px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.header-logo { font-size: 20px; font-weight: 700; color: var(--primary); }
.header-sep { width: 1px; height: 20px; background: var(--border); }
.header-title { font-size: 14px; color: var(--text2); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--text3); font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
.btn-logout:hover { color: var(--red); border-color: var(--red); }

/* Layout */
.layout { display: flex; flex: 1; overflow: hidden; }

/* Nav Rail */
.nav-rail { width: 64px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px; flex-shrink: 0; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 54px; border-radius: 8px; text-decoration: none; color: var(--text3); font-size: 10px; cursor: pointer; transition: all 0.15s; border: none; background: none; }
.nav-item:hover { background: #2a2e40; color: var(--text); }
.nav-item.active { background: rgba(255,45,120,0.18); color: var(--primary); }
.nav-icon { font-size: 20px; }
.nav-label { font-size: 10px; font-weight: 500; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Stats bar */
.stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; gap: 24px; align-items: center; flex-shrink: 0; }
.stat { display: flex; flex-direction: column; gap: 1px; }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 18px; font-weight: 700; color: var(--text); }

/* Toolbar */
.toolbar { padding: 12px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.search-input { background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 6px; font-size: 13px; width: 280px; outline: none; }
.search-input:focus { border-color: var(--primary); }
.btn { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #e0206a; }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-ghost { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--primary); }
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface3); color: var(--text3); transition: all 0.15s; }
.chip:hover, .chip.active { background: rgba(255,45,120,0.15); color: var(--primary); border-color: var(--primary); }

/* Content */
.content { display: flex; flex: 1; overflow: hidden; }

/* Keys list */
.keys-panel { width: 420px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.keys-header { padding: 10px 16px; font-size: 11px; color: var(--text3); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.keys-list { overflow-y: auto; flex: 1; }
.key-item { padding: 10px 16px; border-bottom: 1px solid rgba(46,50,73,0.5); cursor: pointer; transition: background 0.1s; display: flex; flex-direction: column; gap: 3px; }
.key-item:hover { background: var(--surface2); }
.key-item.selected { background: rgba(255,45,120,0.1); border-left: 2px solid var(--primary); }
.key-name { font-size: 12px; font-family: monospace; color: var(--text); word-break: break-all; }
.key-meta { display: flex; gap: 8px; align-items: center; }
.key-type { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; }
.type-string { background: rgba(34,197,94,0.15); color: var(--green); }
.type-list { background: rgba(96,165,250,0.15); color: #60a5fa; }
.type-set { background: rgba(167,139,250,0.15); color: #a78bfa; }
.type-hash { background: rgba(251,146,60,0.15); color: #fb923c; }
.type-other { background: rgba(156,163,175,0.15); color: #9ca3af; }
.key-ttl { font-size: 10px; color: var(--text3); }
.key-preview { font-size: 11px; color: var(--text3); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 340px; }
.key-del-btn { margin-left: auto; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
.key-del-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

/* Value panel */
.value-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.value-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; background: var(--surface); }
.value-key-name { font-family: monospace; font-size: 13px; color: var(--text); flex: 1; word-break: break-all; }
.value-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
pre { font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; color: var(--text2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); gap: 10px; }
.empty-state .icon { font-size: 48px; }
.empty-state .msg { font-size: 14px; }
.loading { color: var(--text3); font-size: 13px; padding: 20px; }
.del-pattern-wrap { display: flex; gap: 8px; align-items: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">MSK</div>
  <div class="header-sep"></div>
  <div class="header-title">Redis Browser</div>
  <div class="header-right">
    <span id="userDisplayName" style="font-size:13px;color:var(--text2)"></span>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</div>

<div class="layout">
  <nav class="nav-rail">
    <a href="/admin/dashboard-ui" class="nav-item" title="Panel">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Panel</span>
    </a>
    <a href="/inbox-ui" class="nav-item" title="Inbox">
      <span class="nav-icon">💬</span>
      <span class="nav-label">Inbox</span>
    </a>
    <a href="/admin/flows-ui" class="nav-item" title="Flujos">
      <span class="nav-icon">🔀</span>
      <span class="nav-label">Flujos</span>
    </a>
    <a href="/admin/prompts-ui" class="nav-item" title="Prompts">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">Prompts</span>
    </a>
    <a href="/admin/users-ui" class="nav-item" title="Usuarios">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Usuarios</span>
    </a>
    <a href="/admin/templates-ui" class="nav-item" title="Templates">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Templates</span>
    </a>
    <a href="/admin/redis-ui" class="nav-item active" title="Redis">
      <span class="nav-icon">🗄️</span>
      <span class="nav-label">Redis</span>
    </a>
  </nav>

  <div class="main">
    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat"><div class="stat-label">Total claves</div><div class="stat-value" id="statKeys">—</div></div>
      <div class="stat"><div class="stat-label">Memoria usada</div><div class="stat-value" id="statMem">—</div></div>
      <div class="stat"><div class="stat-label">Clientes</div><div class="stat-value" id="statClients">—</div></div>
      <div class="stat"><div class="stat-label">Versión Redis</div><div class="stat-value" id="statVersion">—</div></div>
      <button class="btn btn-ghost" style="margin-left:auto" onclick="loadStats()">↻ Stats</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input class="search-input" id="patternInput" placeholder="Patrón de búsqueda (ej: zoho_cache:*)" value="*" onkeydown="if(event.key==='Enter') searchKeys()">
      <button class="btn btn-primary" onclick="searchKeys()">🔍 Buscar</button>
      <div class="filter-chips">
        <div class="chip" onclick="setPattern('conv:*')">conv:*</div>
        <div class="chip" onclick="setPattern('zoho_cache:*')">zoho_cache:*</div>
        <div class="chip" onclick="setPattern('zoho_cursadas:*')">cursadas:*</div>
        <div class="chip" onclick="setPattern('bot_disabled:*')">bot_disabled:*</div>
        <div class="chip" onclick="setPattern('conv_label:*')">labels:*</div>
        <div class="chip" onclick="setPattern('customer_session:*')">sessions:*</div>
        <div class="chip" onclick="setPattern('flow:*')">flows:*</div>
        <div class="chip" onclick="setPattern('*')">Todo</div>
      </div>
      <div class="del-pattern-wrap" style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-danger" onclick="deletePattern()">🗑️ Borrar patrón</button>
        <button class="btn" style="background:rgba(239,68,68,0.25);color:#fca5a5;border:1px solid rgba(239,68,68,0.5);font-weight:700" onclick="flushConversations()">⚠️ Reset conversaciones</button>
        <button class="btn" style="background:#ef4444;color:#fff;border:1px solid #b91c1c;font-weight:800" onclick="nuclearReset()">☢️ Reset NUCLEAR</button>
      </div>
    </div>

    <div class="content">
      <!-- Keys list -->
      <div class="keys-panel">
        <div class="keys-header">
          <span id="keysCount">0 claves</span>
          <span style="font-size:10px;color:var(--text3)" id="keysPattern">*</span>
        </div>
        <div class="keys-list" id="keysList">
          <div class="loading">Cargando claves...</div>
        </div>
      </div>

      <!-- Value viewer -->
      <div class="value-panel">
        <div class="value-header" id="valueHeader" style="display:none">
          <div class="value-key-name" id="valueKeyName"></div>
          <span id="valueTypeBadge" class="key-type"></span>
          <span id="valueTTL" style="font-size:11px;color:var(--text3)"></span>
          <button class="btn btn-danger" onclick="deleteSelected()">🗑️ Eliminar</button>
        </div>
        <div class="value-body" id="valueBody">
          <div class="empty-state">
            <div class="icon">🗄️</div>
            <div class="msg">Seleccioná una clave para ver su valor</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SESSION_TOKEN = localStorage.getItem('msk_session');
if (!SESSION_TOKEN) { window.location.href = '/login'; throw new Error('redirect'); }

let selectedKey = null;
let allKeys = [];

async function verifySession() {
  const r = await fetch('/auth/me', {headers: {'X-Session-Token': SESSION_TOKEN}});
  if (!r.ok) { localStorage.removeItem('msk_session'); window.location.href = '/login'; return; }
  const user = await r.json();
  document.getElementById('userDisplayName').textContent = user.name || user.email;
  if (user.role !== 'admin') {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ef4444;font-size:18px">⛔ Solo administradores</div>';
  }
}

function logout() {
  fetch('/auth/logout', {method:'POST', headers:{'X-Session-Token':SESSION_TOKEN}});
  localStorage.removeItem('msk_session');
  window.location.href = '/login';
}

async function loadStats() {
  try {
    const r = await fetch('/admin/redis/stats', {headers:{'X-Session-Token':SESSION_TOKEN}});
    const d = await r.json();
    document.getElementById('statKeys').textContent = d.dbsize.toLocaleString();
    document.getElementById('statMem').textContent = d.used_memory_human;
    document.getElementById('statClients').textContent = d.connected_clients;
    document.getElementById('statVersion').textContent = d.redis_version;
  } catch(e) { console.error('stats error', e); }
}

function setPattern(p) {
  document.getElementById('patternInput').value = p;
  searchKeys();
}

async function searchKeys() {
  const pattern = document.getElementById('patternInput').value.trim() || '*';
  document.getElementById('keysPattern').textContent = pattern;
  document.getElementById('keysList').innerHTML = '<div class="loading">Buscando...</div>';
  try {
    const r = await fetch('/admin/redis/keys?pattern=' + encodeURIComponent(pattern) + '&limit=300', {headers:{'X-Session-Token':SESSION_TOKEN}});
    const d = await r.json();
    allKeys = d.keys || [];
    renderKeysList(allKeys);
  } catch(e) {
    document.getElementById('keysList').innerHTML = '<div class="loading" style="color:#ef4444">Error: ' + e.message + '</div>';
  }
}

function renderKeysList(keys) {
  document.getElementById('keysCount').textContent = keys.length + ' claves';
  if (!keys.length) {
    document.getElementById('keysList').innerHTML = '<div class="loading">Sin resultados</div>';
    return;
  }
  let html = '';
  keys.forEach(function(k) {
    const typeCls = 'type-' + (k.type === 'string' ? 'string' : k.type === 'list' ? 'list' : k.type === 'set' ? 'set' : k.type === 'hash' ? 'hash' : 'other');
    const ttlStr = k.ttl === -1 ? '∞' : k.ttl === -2 ? 'expirada' : fmtTTL(k.ttl);
    const isSel = selectedKey === k.key;
    const safeKey = btoa(unescape(encodeURIComponent(k.key)));
    html += '<div class="key-item' + (isSel ? ' selected' : '') + '" onclick="selectKey(decodeURIComponent(escape(atob(\'' + safeKey + '\'))))">';
    html += '<div style="display:flex;align-items:flex-start;gap:6px">';
    html += '<div class="key-name">' + esc(k.key) + '</div>';
    html += '<button class="key-del-btn" onclick="event.stopPropagation();deleteKey(decodeURIComponent(escape(atob(\'' + safeKey + '\'))))" title="Eliminar">✕</button>';
    html += '</div>';
    html += '<div class="key-meta"><span class="key-type ' + typeCls + '">' + k.type + '</span><span class="key-ttl">TTL: ' + ttlStr + '</span></div>';
    if (k.preview) html += '<div class="key-preview">' + esc(k.preview) + '</div>';
    html += '</div>';
  });
  document.getElementById('keysList').innerHTML = html;
}

function fmtTTL(seconds) {
  if (seconds < 60) return seconds + 's';
  if (seconds < 3600) return Math.floor(seconds/60) + 'm';
  if (seconds < 86400) return Math.floor(seconds/3600) + 'h';
  return Math.floor(seconds/86400) + 'd';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function selectKey(key) {
  selectedKey = key;
  renderKeysList(allKeys);
  document.getElementById('valueBody').innerHTML = '<div class="loading">Cargando...</div>';
  document.getElementById('valueHeader').style.display = 'flex';
  document.getElementById('valueKeyName').textContent = key;
  try {
    const r = await fetch('/admin/redis/key?key=' + encodeURIComponent(key), {headers:{'X-Session-Token':SESSION_TOKEN}});
    const d = await r.json();
    const typeCls = 'type-' + (d.type === 'string' ? 'string' : d.type === 'list' ? 'list' : d.type === 'set' ? 'set' : d.type === 'hash' ? 'hash' : 'other');
    document.getElementById('valueTypeBadge').className = 'key-type ' + typeCls;
    document.getElementById('valueTypeBadge').textContent = d.type;
    document.getElementById('valueTTL').textContent = 'TTL: ' + (d.ttl === -1 ? '∞ (sin expiración)' : d.ttl === -2 ? 'expirada' : fmtTTL(d.ttl));
    document.getElementById('valueBody').innerHTML = '<pre>' + esc(d.value || '') + '</pre>';
  } catch(e) {
    document.getElementById('valueBody').innerHTML = '<div class="loading" style="color:#ef4444">Error: ' + e.message + '</div>';
  }
}

async function deleteKey(key) {
  if (!confirm('¿Eliminar "' + key + '"?')) return;
  await fetch('/admin/redis/key?key=' + encodeURIComponent(key), {method:'DELETE', headers:{'X-Session-Token':SESSION_TOKEN}});
  if (selectedKey === key) {
    selectedKey = null;
    document.getElementById('valueHeader').style.display = 'none';
    document.getElementById('valueBody').innerHTML = '<div class="empty-state"><div class="icon">🗑️</div><div class="msg">Clave eliminada</div></div>';
  }
  allKeys = allKeys.filter(k => k.key !== key);
  renderKeysList(allKeys);
  loadStats();
}

async function deleteSelected() {
  if (!selectedKey) return;
  await deleteKey(selectedKey);
}

async function deletePattern() {
  const pattern = document.getElementById('patternInput').value.trim();
  if (!pattern || pattern === '*') {
    alert('Especificá un patrón más específico antes de borrar (ej: zoho_cache:*)');
    return;
  }
  if (!confirm('¿Eliminar TODAS las claves que coincidan con "' + pattern + '"?\n\nEsta acción no se puede deshacer.')) return;
  try {
    const r = await fetch('/admin/redis/delete-pattern', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Session-Token':SESSION_TOKEN},
      body: JSON.stringify({pattern: pattern})
    });
    const d = await r.json();
    alert('Eliminadas ' + d.deleted + ' claves');
    selectedKey = null;
    document.getElementById('valueHeader').style.display = 'none';
    document.getElementById('valueBody').innerHTML = '<div class="empty-state"><div class="icon">🗑️</div><div class="msg">Claves eliminadas</div></div>';
    searchKeys();
    loadStats();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function flushConversations() {
  if (!confirm(
    '⚠️ RESET COMPLETO DE CONVERSACIONES\n\n' +
    'Esto eliminará:\n' +
    '• Todas las conversaciones (widget + WhatsApp)\n' +
    '• Estados del menú (wflow:*)\n' +
    '• Cache Zoho (zoho_cache:*, zoho_cursadas:*)\n' +
    '• Etiquetas, asignaciones, eventos\n\n' +
    'Se conservará: configuración del widget, flows, templates.\n\n' +
    '¿Confirmar reset total?'
  )) return;
  try {
    const r = await fetch('/admin/redis/flush-conversations', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Session-Token':SESSION_TOKEN},
    });
    const d = await r.json();
    alert('✅ ' + d.message + '\n\nEliminadas: ' + d.deleted + ' claves');
    selectedKey = null;
    document.getElementById('valueHeader').style.display = 'none';
    document.getElementById('valueBody').innerHTML = '<div class="empty-state"><div class="icon">🧹</div><div class="msg">Redis limpio</div></div>';
    searchKeys();
    loadStats();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function nuclearReset() {
  const confirm1 = prompt(
    '☢️ RESET NUCLEAR — ELIMINA TODO\n\n' +
    'Esto borra:\n' +
    '• Redis: todas las conversaciones, caches, sesiones, eventos\n' +
    '• Supabase: TODOS los customers\n' +
    '• Supabase Auth: todos los users (excepto agentes/admins con perfil)\n\n' +
    'Se conserva: widget:config, flows, templates, perfiles de agentes.\n\n' +
    'Esta acción NO SE PUEDE DESHACER.\n\n' +
    'Escribí "RESET NUCLEAR" para confirmar:'
  );
  if (confirm1 !== 'RESET NUCLEAR') {
    if (confirm1 !== null) alert('Cancelado — confirmación inválida.');
    return;
  }
  try {
    const r = await fetch('/admin/redis/nuclear-reset', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Session-Token':SESSION_TOKEN},
    });
    const d = await r.json();
    if (!r.ok) {
      alert('Error: ' + (d.detail || JSON.stringify(d)));
      return;
    }
    const lines = [
      d.message,
      '',
      'Redis:       ' + d.redis.deleted + ' claves',
      'Customers:   ' + d.supabase.customers_deleted,
      'Auth users:  ' + d.supabase.auth_users_deleted,
    ];
    if (d.supabase.customers_error) lines.push('⚠️ Error customers: ' + d.supabase.customers_error);
    if (d.supabase.auth_error)      lines.push('⚠️ Error auth: ' + d.supabase.auth_error);
    alert(lines.join('\n'));
    selectedKey = null;
    document.getElementById('valueHeader').style.display = 'none';
    document.getElementById('valueBody').innerHTML = '<div class="empty-state"><div class="icon">☢️</div><div class="msg">Sistema reseteado — empezamos de cero</div></div>';
    searchKeys();
    loadStats();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// Init
verifySession();
loadStats();
searchKeys();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Prompts — MSK Latam</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1020;
  --surface: #261e2e;
  --surface2: #322838;
  --surface3: #3d2f48;
  --border: rgba(255,100,150,0.12);
  --primary: #ff2d78;
  --primary-dark: #e0206a;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --text: #f0e8f4;
  --text2: #9a8ea8;
  --text3: #6b5a7a;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.header-logo { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
.header-sep { width: 1px; height: 20px; background: var(--border); }
.header-title { font-size: 14px; color: var(--text2); }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Nav Rail ── */
.nav-rail {
  width: 64px; flex-shrink: 0;
  background: #150d1c;
  border-right: 1px solid rgba(255,100,150,0.08);
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 0; gap: 4px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 8px; border-radius: 8px; cursor: pointer;
  text-decoration: none; color: #9098b8;
  transition: all 0.15s; width: 52px; text-align: center;
}
.nav-item:hover { background: #2a2e40; color: #e8eaf2; }
.nav-item.active { background: rgba(255,45,120,0.18); color: #ff2d78; }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; }

/* ── Sidebar ── */
.sidebar {
  width: 200px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  padding: 16px 0;
}
.sidebar-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  padding: 0 16px 10px 16px;
}
.agent-tab {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  user-select: none;
}
.agent-tab:hover {
  background: var(--surface2);
  color: var(--text);
}
.agent-tab.active {
  background: var(--surface2);
  color: var(--primary);
  border-left-color: var(--primary);
  font-weight: 600;
}
.agent-tab .tab-icon { font-size: 16px; }

/* ── Main editor area ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.editor-toolbar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.editor-agent-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
.editor-file-path {
  font-size: 12px;
  color: var(--text3);
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

.save-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.save-btn:hover { background: var(--primary-dark); }
.save-btn:active { transform: scale(0.97); }
.save-btn:disabled { background: var(--text3); cursor: not-allowed; }

.warning-bar {
  padding: 8px 20px;
  background: rgba(245, 158, 11, 0.1);
  border-bottom: 1px solid rgba(245, 158, 11, 0.25);
  font-size: 12px;
  color: var(--yellow);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.editor-wrap {
  flex: 1;
  overflow: hidden;
  padding: 16px 20px;
}
#prompt-editor {
  width: 100%;
  height: 100%;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  resize: none;
  outline: none;
  tab-size: 4;
  transition: border-color 0.15s;
}
#prompt-editor:focus { border-color: var(--primary); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  color: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: opacity 0.22s ease, transform 0.22s ease;
  z-index: 1000;
}
.toast.show {
  opacity: 1;
  transform: translateY(0);
}
.toast.success { background: #1a6634; border: 1px solid var(--green); }
.toast.error { background: #6b1e1e; border: 1px solid var(--red); }

/* ── Loading skeleton ── */
.loading-placeholder {
  color: var(--text3);
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
  padding: 16px;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">MSK</div>
  <div class="header-sep"></div>
  <div class="header-title">Editor de Prompts</div>
</div>

<!-- Layout -->
<div class="layout">

  <nav class="nav-rail">
    <a href="/admin/dashboard-ui" class="nav-item" title="Panel">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Panel</span>
    </a>
    <a href="/inbox-ui" class="nav-item" title="Inbox">
      <span class="nav-icon">💬</span>
      <span class="nav-label">Inbox</span>
    </a>
    <a href="/admin/flows-ui" class="nav-item" title="Flujos">
      <span class="nav-icon">🔀</span>
      <span class="nav-label">Flujos</span>
    </a>
    <a href="/admin/prompts-ui" class="nav-item active" title="Prompts">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">Prompts</span>
    </a>
    <a href="/admin/users-ui" class="nav-item" title="Usuarios">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Usuarios</span>
    </a>
    <a href="/admin/templates-ui" class="nav-item" title="Templates">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Templates</span>
    </a>
    <a href="/admin/redis-ui" class="nav-item" title="Redis">
      <span class="nav-icon">🗄️</span>
      <span class="nav-label">Redis</span>
    </a>
  </nav>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-label">Agentes</div>
    <div class="agent-tab active" data-agent="ventas" data-label="Agente de Ventas" data-file="agents/sales/prompts.py">
      <span class="tab-icon">💼</span> Ventas
    </div>
    <div class="agent-tab" data-agent="cobranzas" data-label="Agente de Cobranzas" data-file="agents/collections/prompts.py">
      <span class="tab-icon">💳</span> Cobranzas
    </div>
    <div class="agent-tab" data-agent="post_venta" data-label="Agente Post-venta" data-file="agents/post_sales/prompts.py">
      <span class="tab-icon">🎓</span> Post-venta
    </div>
    <div style="height:1px;background:rgba(255,100,150,0.15);margin:8px 12px;"></div>
    <div class="agent-tab" data-agent="bienvenida" data-label="Saludo del Widget" data-file="agents/routing/greeting_prompt.py">
      <span class="tab-icon">👋</span> Saludo
    </div>
    <div class="agent-tab" data-agent="orquestador" data-label="Orquestador / Clasificador" data-file="agents/routing/router_prompt.py">
      <span class="tab-icon">🔀</span> Orquestador
    </div>
  </aside>

  <!-- Main editor -->
  <div class="main">
    <div class="editor-toolbar">
      <div class="editor-agent-name" id="agent-label">Agente de Ventas</div>
      <div class="editor-file-path" id="agent-file">agents/sales/prompts.py</div>
      <button class="save-btn" id="save-btn" onclick="savePrompt()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Guardar
      </button>
    </div>

    <div class="warning-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      Los cambios se aplican en el próximo mensaje enviado al agente
    </div>

    <div class="editor-wrap">
      <textarea id="prompt-editor" spellcheck="false" placeholder="Cargando prompt..."></textarea>
    </div>
  </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
// ─── Auth guard ───────────────────────────────────────────────────────────────
(async () => {
  const token = localStorage.getItem('msk_session');
  if (!token) { window.location.href = '/login'; return; }
  try {
    const r = await fetch('/auth/me', {headers: {'X-Session-Token': token}});
    if (!r.ok) { localStorage.removeItem('msk_session'); localStorage.removeItem('msk_user'); window.location.href = '/login'; return; }
    const user = await r.json();
    if (user.role !== 'admin') { window.location.href = '/inbox-ui'; return; }
    if (user.role === 'admin' || user.role === 'supervisor') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.removeProperty('display'));
    }
  } catch(e) {}
})();

(function () {
  let currentAgent = 'ventas';
  const SESSION_TOKEN = localStorage.getItem('msk_session') || '';

  const editor = document.getElementById('prompt-editor');
  const saveBtn = document.getElementById('save-btn');
  const agentLabel = document.getElementById('agent-label');
  const agentFile = document.getElementById('agent-file');
  const toast = document.getElementById('toast');

  // ── Tab switching ──
  document.querySelectorAll('.agent-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.agent-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentAgent = tab.dataset.agent;
      agentLabel.textContent = tab.dataset.label;
      agentFile.textContent = tab.dataset.file;
      loadPrompt(currentAgent);
    });
  });

  // ── Load prompt ──
  async function loadPrompt(agent) {
    editor.value = '';
    editor.placeholder = 'Cargando prompt...';
    saveBtn.disabled = true;
    try {
      const res = await fetch('/admin/prompts/' + agent, {headers: {'X-Session-Token': SESSION_TOKEN}});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      editor.value = data.content;
      editor.placeholder = '';
    } catch (err) {
      editor.value = '';
      editor.placeholder = 'Error al cargar el prompt: ' + err.message;
      showToast('Error al cargar el prompt', 'error');
    } finally {
      saveBtn.disabled = false;
    }
  }

  // ── Save prompt ──
  window.savePrompt = async function () {
    saveBtn.disabled = true;
    saveBtn.textContent = 'Guardando...';
    try {
      const res = await fetch('/admin/prompts/' + currentAgent, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Token': SESSION_TOKEN },
        body: JSON.stringify({ content: editor.value }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || 'HTTP ' + res.status);
      }
      showToast('Prompt guardado correctamente', 'success');
    } catch (err) {
      showToast('Error al guardar: ' + err.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar';
    }
  };

  // ── Toast ──
  let toastTimer = null;
  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toast.classList.remove('show');
    }, 3500);
  }

  // ── Keyboard shortcut: Ctrl+S / Cmd+S ──
  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      if (!saveBtn.disabled) savePrompt();
    }
  });

  // ── Initial load ──
  loadPrompt(currentAgent);
})();
</script>
</body>
</html>

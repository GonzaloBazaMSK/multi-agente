server {
    server_name agentes.msklatam.com;

    # API FastAPI: todo lo que empieza con /api/
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Endpoints legacy del bot (widget, webhooks, etc) — siguen funcionando
    location ~ ^/(widget|webhook|admin|inbox|inbox-ui|auth|templates|flows|reports|test-agent|autonomous|customer-auth|health|static|media|demo)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Endpoints exactos en raiz que sirve FastAPI (widget embebible + demos)
    location = /widget.js { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /msk       { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /test      { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /audio-test { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /health    { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /inbox-ui  { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }

    # UI Next.js: todo lo demas
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/agentes.msklatam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentes.msklatam.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = agentes.msklatam.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name agentes.msklatam.com;
    return 404;
}

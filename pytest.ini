[pytest]
# Solo los tests que viven en tests/. Hay archivos con prefijo `test_` en
# scripts/ que NO son tests sino runners manuales (test_router.py etc).
testpaths = tests
asyncio_mode = auto
filterwarnings =
    # asyncpg/pydantic v2 emiten DeprecationWarnings que no son nuestros.
    ignore::DeprecationWarning

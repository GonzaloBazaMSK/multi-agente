<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reports — MSK Inbox</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0d11;
  --surface: #14171c;
  --surface2: #1b1f26;
  --surface3: #252a33;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.10);
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --primary-soft: rgba(99,102,241,0.12);
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --orange: #fb923c;
  --purple: #a78bfa;
  --blue: #60a5fa;
  --text: #e6e8ec;
  --text2: #a0a4ad;
  --text3: #6b7280;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.topbar .logo { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
.topbar .crumb { color: var(--text2); font-size: 14px; }
.topbar .crumb strong { color: var(--text); font-weight: 600; }
.topbar .spacer { flex: 1; }
.topbar .backlink { color: var(--text2); text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; }
.topbar .backlink:hover { color: var(--text); border-color: var(--border-strong); }

.filters {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.filters label { font-size: 13px; color: var(--text2); }
.rangebtn {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.rangebtn.active { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
.rangebtn:hover:not(.active) { color: var(--text); border-color: var(--border-strong); }

.container { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
}
.kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.kpi-value { font-size: 28px; font-weight: 800; color: var(--text); margin-top: 6px; letter-spacing: -0.5px; }
.kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.kpi.highlight { background: linear-gradient(135deg, var(--primary-soft), transparent); border-color: var(--primary); }
.kpi.highlight .kpi-value { color: var(--primary); }
.kpi.green .kpi-value { color: var(--green); }
.kpi.red .kpi-value { color: var(--red); }

/* Grid */
.row {
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 900px) { .row { grid-template-columns: 1fr; } }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
}
.panel-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.panel-title .count { margin-left: auto; font-size: 12px; color: var(--text3); font-weight: 400; }

/* Leaderboard */
.lb { display: flex; flex-direction: column; gap: 8px; }
.lb-row {
  display: grid;
  grid-template-columns: 32px 1fr auto auto auto;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 8px;
  font-size: 13px;
}
.lb-rank { font-weight: 800; color: var(--text3); font-size: 14px; text-align: center; }
.lb-row:first-child .lb-rank { color: #fbbf24; }
.lb-row:nth-child(2) .lb-rank { color: #cbd5e1; }
.lb-row:nth-child(3) .lb-rank { color: #b45309; }
.lb-name { color: var(--text); font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
.lb-stat { font-size: 12px; color: var(--text2); text-align: right; }
.lb-stat b { color: var(--text); font-weight: 700; }
.lb-conv { padding: 2px 8px; background: var(--primary-soft); color: var(--primary); border-radius: 4px; font-size: 11px; font-weight: 700; }

/* Categories */
.cat-list { display: flex; flex-direction: column; gap: 8px; }
.cat-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0;
}
.cat-label { min-width: 140px; font-size: 12px; color: var(--text); }
.cat-bar {
  flex: 1; height: 10px; background: var(--surface3); border-radius: 6px; overflow: hidden;
}
.cat-fill { height: 100%; background: var(--primary); border-radius: 6px; transition: width 0.4s; }
.cat-count { font-size: 12px; font-weight: 700; color: var(--text); min-width: 32px; text-align: right; }

/* Timeline bars */
.tl-grid {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(20px, 1fr);
  gap: 4px;
  align-items: end;
  height: 180px;
  margin-top: 8px;
  padding: 0 4px;
}
.tl-col {
  display: flex; flex-direction: column; align-items: center;
  height: 100%;
  position: relative;
}
.tl-bar {
  width: 100%;
  background: var(--primary);
  border-radius: 4px 4px 0 0;
  transition: height 0.3s;
  position: relative;
}
.tl-bar-won {
  background: var(--green);
  border-radius: 4px 4px 0 0;
  position: absolute;
  bottom: 0; left: 0; right: 0;
}
.tl-col:hover .tl-tooltip { display: block; }
.tl-tooltip {
  display: none;
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  background: var(--surface3); color: var(--text); padding: 4px 8px;
  border-radius: 4px; font-size: 11px; white-space: nowrap; margin-bottom: 4px;
  pointer-events: none;
}
.tl-dates {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(20px, 1fr);
  gap: 4px;
  padding: 6px 4px 0;
  border-top: 1px solid var(--border);
}
.tl-date { text-align: center; font-size: 10px; color: var(--text3); }
.tl-legend { display: flex; gap: 14px; margin-top: 12px; font-size: 11px; color: var(--text2); }
.tl-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

.empty { text-align: center; padding: 36px 20px; color: var(--text3); font-size: 13px; }
.loading { text-align: center; padding: 36px 20px; color: var(--text3); font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">MSK</span>
  <span class="crumb">Reports / <strong>Supervisor</strong></span>
  <span class="spacer"></span>
  <a class="backlink" href="/inbox-ui">← Volver al inbox</a>
</div>

<div class="filters">
  <label>Rango:</label>
  <button class="rangebtn" data-days="1"  onclick="setRange(1, this)">Hoy</button>
  <button class="rangebtn active" data-days="7"  onclick="setRange(7, this)">7 días</button>
  <button class="rangebtn" data-days="14" onclick="setRange(14, this)">14 días</button>
  <button class="rangebtn" data-days="30" onclick="setRange(30, this)">30 días</button>
  <button class="rangebtn" data-days="90" onclick="setRange(90, this)">90 días</button>
</div>

<div class="container">

  <!-- KPI cards -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="loading">Cargando KPIs...</div>
  </div>

  <!-- Leaderboard + Categories -->
  <div class="row">
    <div class="panel">
      <div class="panel-title">🏆 Leaderboard de agentes <span class="count" id="lbCount"></span></div>
      <div id="leaderboard"><div class="loading">Cargando...</div></div>
    </div>
    <div class="panel">
      <div class="panel-title">📊 Categorías de cierre</div>
      <div id="categories"><div class="loading">Cargando...</div></div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="panel">
    <div class="panel-title">📈 Cierres por día <span class="count" id="tlRange"></span></div>
    <div class="tl-grid" id="timeline"></div>
    <div class="tl-dates" id="timelineDates"></div>
    <div class="tl-legend">
      <span><span class="tl-dot" style="background:var(--primary)"></span> Cerradas</span>
      <span><span class="tl-dot" style="background:var(--green)"></span> Ventas cerradas</span>
    </div>
  </div>

</div>

<script>
const SESSION_TOKEN = localStorage.getItem('msk_session');
if (!SESSION_TOKEN) { window.location.href = '/login'; throw new Error('redirect'); }
const API = '';
let currentDays = 7;

async function authFetch(url) {
  const r = await fetch(url, { headers: { 'X-Session-Token': SESSION_TOKEN } });
  if (r.status === 401) { localStorage.removeItem('msk_session'); window.location.href = '/login'; return null; }
  if (r.status === 403) throw new Error('Sin permisos (se requiere admin o supervisor).');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const CAT_META = {
  venta_cerrada:    { label: '💰 Venta cerrada',    color: '#10b981' },
  descartado:       { label: '❌ Lead descartado',   color: '#ef4444' },
  info:             { label: 'ℹ️ Info entregada',    color: '#60a5fa' },
  soporte_resuelto: { label: '🔧 Soporte resuelto',  color: '#10b981' },
  derivado:         { label: '🔀 Derivado humano',   color: '#a78bfa' },
  otro:             { label: '📝 Otro',              color: '#9ca3af' },
  sin_categoria:    { label: '— Sin categoría',      color: '#6b7280' },
};

function setRange(days, btn) {
  currentDays = days;
  document.querySelectorAll('.rangebtn').forEach(b => b.classList.toggle('active', b === btn));
  loadAll();
}

async function loadOverview() {
  try {
    const d = await authFetch(`/admin/reports/overview?days=${currentDays}`);
    const html = `
      <div class="kpi">
        <div class="kpi-label">Total conversaciones</div>
        <div class="kpi-value">${d.total}</div>
        <div class="kpi-sub">últimos ${d.days} días</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Cerradas</div>
        <div class="kpi-value">${d.closed}</div>
        <div class="kpi-sub">${d.total ? Math.round(d.closed/d.total*100) : 0}% del total</div>
      </div>
      <div class="kpi green">
        <div class="kpi-label">Ventas cerradas</div>
        <div class="kpi-value">${d.won}</div>
        <div class="kpi-sub">en el rango</div>
      </div>
      <div class="kpi red">
        <div class="kpi-label">Descartados</div>
        <div class="kpi-value">${d.lost}</div>
        <div class="kpi-sub">en el rango</div>
      </div>
      <div class="kpi highlight">
        <div class="kpi-label">Conversión</div>
        <div class="kpi-value">${d.conversion_rate}%</div>
        <div class="kpi-sub">${d.won} ventas / ${d.closed} cerradas</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Abiertas ahora</div>
        <div class="kpi-value">${d.open_now}</div>
        <div class="kpi-sub">sin cerrar</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Mensajes</div>
        <div class="kpi-value">${d.messages}</div>
        <div class="kpi-sub">intercambiados</div>
      </div>`;
    document.getElementById('kpiGrid').innerHTML = html;
  } catch (e) {
    document.getElementById('kpiGrid').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}

async function loadLeaderboard() {
  try {
    const d = await authFetch(`/admin/reports/leaderboard?days=${currentDays}`);
    document.getElementById('lbCount').textContent = `${d.rows.length} agente${d.rows.length!==1?'s':''}`;
    if (!d.rows.length) {
      document.getElementById('leaderboard').innerHTML = '<div class="empty">Sin cierres registrados en el rango.</div>';
      return;
    }
    const html = '<div class="lb">' + d.rows.map((r, i) => `
      <div class="lb-row">
        <div class="lb-rank">${i < 3 ? ['🥇','🥈','🥉'][i] : '#'+(i+1)}</div>
        <div class="lb-name">${esc(r.agent)}</div>
        <div class="lb-stat"><b>${r.closed}</b> cerradas</div>
        <div class="lb-stat" style="color:var(--green)"><b>${r.won}</b> ventas</div>
        <span class="lb-conv">${r.conversion_rate}%</span>
      </div>`).join('') + '</div>';
    document.getElementById('leaderboard').innerHTML = html;
  } catch (e) {
    document.getElementById('leaderboard').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}

async function loadCategories() {
  try {
    const d = await authFetch(`/admin/reports/categories?days=${currentDays}`);
    if (!d.rows.length) {
      document.getElementById('categories').innerHTML = '<div class="empty">Sin categorías registradas.</div>';
      return;
    }
    const total = d.rows.reduce((a, r) => a + r.total, 0);
    const html = '<div class="cat-list">' + d.rows.map(r => {
      const meta = CAT_META[r.category] || { label: r.category, color: '#9ca3af' };
      const pct = total ? Math.round(r.total / total * 100) : 0;
      return `
        <div class="cat-item">
          <div class="cat-label">${meta.label}</div>
          <div class="cat-bar"><div class="cat-fill" style="width:${pct}%;background:${meta.color}"></div></div>
          <div class="cat-count">${r.total}</div>
        </div>`;
    }).join('') + '</div>';
    document.getElementById('categories').innerHTML = html;
  } catch (e) {
    document.getElementById('categories').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}

async function loadTimeline() {
  try {
    const daysForTl = Math.min(currentDays, 30);
    const d = await authFetch(`/admin/reports/timeline?days=${daysForTl}`);
    document.getElementById('tlRange').textContent = `${d.days} días`;
    if (!d.rows.length) {
      document.getElementById('timeline').innerHTML = '';
      return;
    }
    const max = Math.max(1, ...d.rows.map(r => r.closed));
    const bars = d.rows.map(r => {
      const hPct = (r.closed / max) * 100;
      const wonPct = r.closed ? (r.won / r.closed) * 100 : 0;
      return `
        <div class="tl-col">
          <div class="tl-tooltip">${r.day}: ${r.closed} cerradas, ${r.won} ventas</div>
          <div class="tl-bar" style="height:${hPct}%">
            <div class="tl-bar-won" style="height:${wonPct}%"></div>
          </div>
        </div>`;
    }).join('');
    document.getElementById('timeline').innerHTML = bars;
    const dates = d.rows.map(r => {
      const dt = new Date(r.day);
      return `<div class="tl-date">${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}</div>`;
    }).join('');
    document.getElementById('timelineDates').innerHTML = dates;
  } catch (e) {
    document.getElementById('timeline').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}

async function loadAll() {
  await Promise.all([loadOverview(), loadLeaderboard(), loadCategories(), loadTimeline()]);
}
loadAll();
</script>
</body>
</html>

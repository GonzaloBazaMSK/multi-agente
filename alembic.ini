# Alembic config — migraciones de Postgres versionadas.
#
# Uso:
#   alembic revision -m "descripcion"  # crear migración nueva (vacía)
#   alembic upgrade head               # aplicar pendientes
#   alembic downgrade -1               # rollback 1 migración
#   alembic current                    # qué versión está aplicada
#   alembic history                    # historia completa
#
# El script_location apunta a alembic/ (carpeta creada con `alembic init`).
# sqlalchemy.url lo resuelve dinámicamente alembic/env.py desde
# DATABASE_URL del .env — NO hardcodear acá.

[alembic]
script_location = alembic
prepend_sys_path = .

# Archivos de migración: `<rev>_<descripcion>.py`
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

timezone = UTC
truncate_slug_length = 40

# Orden por orden de creación (revisión), no por timestamp del archivo.
sourceless = false

# Loggers — usamos structlog en la app pero Alembic usa logging standard.
# Dejamos config mínima para que sus logs no colisionen con structlog.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
